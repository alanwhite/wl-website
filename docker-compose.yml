services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: wl_website
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        AUTH_CREDENTIALS_TEST: "true"
    restart: unless-stopped
    container_name: ${COMPOSE_PROJECT_NAME:-wl-website}-app
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/wl_website?schema=public
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
      - gateway

networks:
  internal:
    driver: bridge
  gateway:
    name: wl-gateway
    external: true

volumes:
  pgdata:
  uploads:
